theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.ico
  custom_dir: overrides
  font:
    text: Roboto
    code: Fira Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.tabs.sticky.mobile
    - navigation.tabs.underline
    - navigation.tabs.underline.mobile
    - navigation.tabs.scrollable
    - navigation.tabs.scrollable.mobile
    - navigation.tabs.autoscroll
    - navigation.top
    - navigation.footer
    # - toc.integrate
    - toc.follow
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.expand
    - navigation.sections 
    - navigation.indexes
    - navigation.tracking
    - navigation.path
    - search.highlight
    - search.suggest
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.share
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Dark Mode
      primary: gold
      accent: purple
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Light Mode
      primary: teal
      accent: orange
    
  # Removed invalid 'icon' and 'social' keys from 'theme' section.

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - footnotes
  - tables
  - def_list

extra_css:
  - assets/custom.css
extra_javascript:
  - assets/custom.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anuxlab
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/anuragprasadguwahati
      name: LinkedIn
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/
      name: Twitter
  portfolio:
    enabled: true
    title: "Projects & Work"
    description: "Showcase of selected projects and achievements."
# Note: Consider adding 'redirects' plugin to formally map legacy resume/portfolio paths.

plugins:
  - search
  - redirects:
      redirect_maps:
        resume.md: index.md
        portfolio.md: index.md
        other/about.md: about.md
        other/contact.md: contact.md
        other/portfolio.md: index.md
# Removed legacy case-differing redirect entries (Projects/, Research/, etc.) to eliminate capitalized output dirs on macOS.
# If required for production, reintroduce selectively after confirming host FS case-sensitivity.
# TODO: Optionally add mkdocs-macros + dynamic year later.